    <title>Games | Sidequest Cafe</title>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

            <a class="navbar-brand" href="/index.html">Sidequest Cafe</a>

                    <li class="nav-item">

                    <li class="nav-item">
