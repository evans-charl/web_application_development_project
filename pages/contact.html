<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <title>Contact | The Sidequest Cafe</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/index.html">Sidequest Cafe</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navigation">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pages/about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pages/menu.html">Menu</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pages/games.html">Games</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pages/gallery.html">Gallery</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pages/events.html">Events</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pages/contact.html">Contact</a>
                    </li>
                </ul>

                <button id="themeToggle" class="btn btn-warning ms-3" aria-label="Toggle dark mode">🌙</button>
            </div>
        </div>
    </nav>

    <section class="container py-5">
        <h1 class="text-center">Visit The Cafe</h1>
        <div class="row g-4 mt-4">
            <div class="col-md-6">
                <div class="card p-4">
                    <h3>Location</h3>
                    <p>Westlands, Nairobi</p>
                    <h3>Opening Hours</h3>
                    <p>Monday-Friday: 7AM - 10PM<br>Weekend: 8AM - 11PM</p>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-4">
                    <h3>Send A Message</h3>
                    <form id="contactForm">
                        <input id="name" class="form-control mb-3" placeholder="Name">
                        <input id="email" class="form-control mb-3" placeholder="Email">
                        <textarea id="message" class="form-control mb-3" placeholder="Message"></textarea>
                        <button class="btn btn-warning">Send</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center p-4 mt-5">
        <p>&copy; 2026 The Sidequest Cafe</p>
        <p>Coffee &bull; Community &bull; Board Games</p>
    </footer>

    <script src="/js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
